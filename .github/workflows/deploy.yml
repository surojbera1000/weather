name: Deploy to GitHub Pages

on:
  # Run on every push to the main branch
  push:
    branches: ["main"]
  # Allow manually triggering from the Actions tab
  workflow_dispatch:

# Permissions needed for the GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel older in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        # enablement: true turns Pages on automatically if it isn't already
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo (the site is just static files at the root)
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
