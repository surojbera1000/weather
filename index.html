<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Weather Now</title>

  <!-- PWA / installable app -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1f2d52" />
  <meta name="description" content="Live weather, hourly &amp; 7-day forecast for any city in the world." />
  <link rel="icon" type="image/png" href="favicon-64.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Weather Now" />

  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Critical splash styles (inline so the splash shows instantly, no flash) -->
  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(160deg, #2b3f6b, #1b2747);
      transition: opacity 0.6s ease, visibility 0.6s ease;
      font-family: "Poppins", system-ui, sans-serif;
      color: #fff;
    }
    #splash.hide { opacity: 0; visibility: hidden; }
    #splash.hide .splash__logo { animation: none; transform: scale(1.6); opacity: 0; }
    #splash.hide .splash__title,
    #splash.hide .splash__dots { opacity: 0; transform: translateY(-8px); }
    .splash__logo {
      font-size: 4.5rem;
      line-height: 1;
      animation: splashFloat 1.8s ease-in-out infinite;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
      transition: transform 0.6s ease, opacity 0.6s ease;
    }
    .splash__title {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: splashFadeUp 0.7s ease 0.15s forwards;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .splash__dots { display: flex; gap: 8px; transition: opacity 0.5s ease, transform 0.5s ease; }
    .splash__dots span {
      width: 9px; height: 9px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      animation: splashBounce 1.2s ease-in-out infinite;
    }
    .splash__dots span:nth-child(2) { animation-delay: 0.18s; }
    .splash__dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes splashFloat {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-14px) rotate(4deg); }
    }
    @keyframes splashFadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes splashBounce {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-9px); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .splash__logo, .splash__dots span { animation: none; }
    }
  </style>
</head>
<body>
  <!-- Animated splash screen (fades out once weather is loaded) -->
  <div id="splash">
    <div class="splash__logo">🌤️</div>
    <div class="splash__title">Weather Now</div>
    <div class="splash__dots"><span></span><span></span><span></span></div>
  </div>

  <!-- Pull-to-refresh indicator -->
  <div class="ptr" id="ptr">
    <span class="ptr__icon" id="ptrIcon">↓</span>
    <span class="ptr__text" id="ptrText">Pull to refresh</span>
  </div>

  <div class="app" id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar__place">
        <h1 class="topbar__name" id="placeName">—</h1>
        <p class="topbar__sub" id="placeTime">—</p>
      </div>
      <div class="topbar__actions">
        <button type="button" class="iconbtn" id="searchToggle" aria-label="Search city" title="Search">🔍</button>
        <button type="button" class="iconbtn" id="locBtn" aria-label="Use my location" title="My location">📍</button>
        <button type="button" class="iconbtn" id="settingsToggle" aria-label="Settings" title="Settings">⚙️</button>
      </div>
    </header>

    <!-- Search panel (toggled) -->
    <div class="panel" id="searchPanel" hidden>
      <form class="search" id="searchForm" autocomplete="off">
        <div class="search__field">
          <input
            type="text"
            id="cityInput"
            class="search__input"
            placeholder="🔎 Search for a city..."
            aria-label="City name"
            role="combobox"
            aria-expanded="false"
            aria-autocomplete="list"
            aria-controls="suggestions"
          />
          <ul class="suggestions" id="suggestions" role="listbox" hidden></ul>
        </div>
        <button type="submit" class="search__btn" aria-label="Search">🔍</button>
      </form>
    </div>

    <!-- Settings panel (toggled) -->
    <div class="panel" id="settingsPanel" hidden>
      <div class="row">
        <span class="row__label">📍 Auto Location</span>
        <label class="switch" title="Auto-detect my location on startup">
          <input type="checkbox" id="autoLocToggle" aria-label="Auto Location" />
          <span class="switch__slider"></span>
        </label>
      </div>
      <div class="row">
        <span class="row__label">🌡️ Temperature unit</span>
        <div class="unit" id="unitToggle" role="group" aria-label="Temperature unit">
          <button type="button" class="unit__btn is-active" data-unit="c">°C</button>
          <button type="button" class="unit__btn" data-unit="f">°F</button>
        </div>
      </div>
    </div>

    <!-- Status messages -->
    <div class="status" id="status"></div>

    <!-- Current summary -->
    <section class="current" id="current" hidden>
      <div class="current__left">
        <div class="current__temp"><span id="temp">--</span><span class="current__deg" id="unitLabel">°C</span></div>
        <div class="current__desc" id="desc">—</div>
      </div>
      <div class="current__icon" id="mainIcon">⛅</div>
    </section>

    <!-- Hourly forecast -->
    <section class="hourly" id="hourly" hidden>
      <div class="hourly__track" id="hourlyTrack"></div>
    </section>

    <!-- 7-day forecast -->
    <section class="daily" id="daily" hidden>
      <div class="daily__list" id="dailyList"></div>
    </section>

    <!-- Details -->
    <section class="details" id="details" hidden>
      <h3 class="section-title">Details</h3>

      <!-- Sunrise / sunset arc -->
      <div class="sun">
        <svg class="sun__svg" viewBox="0 0 320 132" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="sunFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="rgba(255,255,255,0.20)" />
              <stop offset="1" stop-color="rgba(255,255,255,0)" />
            </linearGradient>
          </defs>
          <path d="M16,116 A 144,96 0 0 1 304,116 Z" fill="url(#sunFill)" />
          <path d="M16,116 A 144,96 0 0 1 304,116" fill="none"
                stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-dasharray="5 7" />
          <line x1="8" y1="116" x2="312" y2="116" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" />
          <circle id="sunDot" cx="16" cy="116" r="7" fill="#ffd24a" />
        </svg>
        <div class="sun__times">
          <span class="sun__time">🌅 <span id="sunrise">--:--</span></span>
          <span class="sun__time"><span id="sunset">--:--</span> 🌇</span>
        </div>
      </div>

      <!-- Detail metrics -->
      <div class="metrics">
        <div class="metric">
          <div class="metric__icon">🌡️</div>
          <div class="metric__label">Sensible</div>
          <div class="metric__value" id="sensible">--°</div>
        </div>
        <div class="metric">
          <div class="metric__icon">💧</div>
          <div class="metric__label">Humidity</div>
          <div class="metric__value" id="humidity">--%</div>
        </div>
        <div class="metric">
          <div class="metric__icon">🧭</div>
          <div class="metric__label">Wind</div>
          <div class="metric__value" id="wind">--</div>
        </div>
        <div class="metric">
          <div class="metric__icon">📊</div>
          <div class="metric__label">Pressure</div>
          <div class="metric__value" id="pressure">-- hPa</div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p>Data by <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    // Register the service worker so the app is installable & works offline.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((err) => {
          console.warn("Service worker registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
